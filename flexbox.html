<!DOCTYPE html>
<html>
    <head>
      <title>flex box</title>
    </head>

    <style>
        .flex-container{
            display: flex;
            justify-content: center;
            background-color: white;
        }
        .flex-container > div{
            background-color: white;
            margin: 10px;
            padding: 20px;
            font-size: large;
        }
        img{
            width: 100%;
            height: 100%;
        }
    </style>

    <body>
    <div class="flex-container">

      <div> 
          <img src="images/redshoes.jpg">
     </div>

      <div>
        <img src="images/boyshoes">
      </div>

      <div>
        <img src="images/legs">
      </div>
     
    </div>

</body>
</html>
